name: Build Prompt Keeper

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run make

      - name: Upload macOS build
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-keeper-mac
          path: out/make/**/*
          retention-days: 90

      - name: Upload Windows build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-keeper-windows
          path: out/make/**/*
          retention-days: 90
